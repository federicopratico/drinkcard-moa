spring:
  application:
    name: festival-drinks

  config:
    import: optional:file:.env[.properties]

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  mvc:
    throw-exception-if-no-handler-found: true

  web:
    resources:
      add-mappings: false

server:
  port: ${PORT:8080}

jwt:
  secret: ${JWT_SECRET}
  expiration-minutes: ${JWT_EXPIRATION_MINUTES:1440}

refresh-token:
  expiration-days: ${REFRESH_TOKEN_EXPIRATION_DAYS:10}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:}
  payment:
    frontend-success-url: ${PAYMENT_FRONTEND_SUCCESS_URL}
    checkout-expiration: ${PAYMENT_CHECKOUT_EXPIRATION:15m}
    webhook-return-url: ${PAYMENT_WEBHOOK_RETURN_URL}
  lock:
    region: ${APP_LOCK_REGION:DEFAULT}
    time-to-live: ${APP_LOCK_TTL:30s}
    idle-between-tries: ${APP_LOCK_IDLE_BETWEEN_TRIES:100ms}
  bootstrap-admin:
    enabled: ${BOOTSTRAP_ADMIN_ENABLED:false}
    first-name: ${BOOTSTRAP_ADMIN_FIRST_NAME:System}
    last-name: ${BOOTSTRAP_ADMIN_LAST_NAME:Admin}
    email: ${BOOTSTRAP_ADMIN_EMAIL:}
    password: ${BOOTSTRAP_ADMIN_PASSWORD:}

sumup:
  base-url: ${SUMUP_BASE_URL}
  api-key: ${SUMUP_API_KEY}
  merchant-code: ${SUMUP_MERCHANT_CODE}

logging:
  level:
    cat.itacademy.s04.t02.n02.drinkcardmoa: INFO
    org.springframework.security: WARN

drinkcard:
  ticket-expiration-cleanup-delay-ms: 60000

mailtrap:
  sender-email: ${MAILTRAP_SENDER_EMAIL:no-reply@moa.it}
  token: ${MAILTRAP_TOKEN:test-token}
  registration-link-base-url: ${MAILTRAP_REGISTRATION_LINK_BASE_URL:http://localhost:8080/api/v1/auth/register}
  templates:
    invitation: ${MAILTRAP_TEMPLATE_INVITATION:}
    password_reset: ${MAILTRAP_TEMPLATE_PASSWORD_RESET:}