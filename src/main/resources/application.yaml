spring:
  application:
    name: festival-drinks

  config:
    import: optional:file:.env[.properties]

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

jwt:
  secret: ${JWT_SECRET}
  expiration-minutes: ${JWT_EXPIRATION_MINUTES:1440}

app:
  payment:
    frontend-success-url: ${PAYMENT_FRONTEND_SUCCESS_URL}
    checkout-expiration: ${PAYMENT_CHECKOUT_EXPIRATION:10}

sumup:
  base-url: ${SUMUP_BASE_URL}
  api-key: ${SUMUP_API_KEY}
  merchant-code: ${SUMUP_MERCHANT_CODE}

logging:
  level:
    cat.itacademy.s04.t02.n02.drinkcardmoa: INFO
    org.springframework.security: WARN

drinkcard:
  ticket-expiration-cleanup-delay-ms: 60000

mailtrap:
  sender-email: ${MAILTRAP_SENDER_EMAIL:no-reply@moa.it}
  token: ${MAILTRAP_TOKEN:test-token}
  registration-link-base-url: ${MAILTRAP_REGISTRATION_LINK_BASE_URL:http://localhost:8080/api/v1/auth/register}
  templates:
    invitation: ${MAILTRAP_TEMPLATE_INVITATION:}
    password_reset: ${MAILTRAP_TEMPLATE_PASSWORD_RESET:}