spring:
  application:
    name: festival-drinks

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/festival}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

jwt:
  secret: ${JWT_SECRET}
  expiration-minutes: ${JWT_EXPIRATION_MINUTES:1440}

app:
  payment:
    frontend-success-url: ${PAYMENT_FRONTEND_SUCCESS_URL:http://localhost:3000/payment/success}

sumup:
  base-url: ${SUMUP_BASE_URL:https://api.sumup.com}
  api-key: ${SUMUP_API_KEY}
  merchant-code: ${SUMUP_MERCHANT_CODE}

logging:
  level:
    cat.itacademy.s04.t02.n02.drinkcardmoa: DEBUG
    org.springframework.security: DEBUG
